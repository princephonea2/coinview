<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Multi-Window Live</title>
    <style>
        body { font-family: Arial; background: #1a2a3a; padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 1000px; margin: 0 auto; }
        .card { background: white; border-radius: 8px; padding: 12px; }
        .header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .title { font-weight: bold; }
        .code { font-family: monospace; color: #e67e22; }
        input { width: 100px; padding: 4px; margin-right: 5px; text-transform: uppercase; }
        button { background: #f39c12; color: white; border: none; padding: 4px 10px; border-radius: 3px; cursor: pointer; }
        .image-container { border: 1px solid #ddd; min-height: 120px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        img { max-width: 100%; max-height: 120px; }
        .placeholder { color: #aaa; font-size: 12px; }
        .status { font-size: 11px; margin-top: 4px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="grid">
        
        <div class="card">
            <div class="header">
                <span class="title">Window 1</span>
                <span class="code">2F3GS6FN</span>
            </div>
            <div>
                <input type="text" id="in1" maxlength="8" placeholder="Code">
                <button id="go1">GO</button>
            </div>
            <div class="image-container" id="imgContainer1">
                <div class="placeholder" id="pl1">✨ Enter code</div>
                <img id="img1" style="display:none">
            </div>
            <div class="status" id="st1"></div>
        </div>
        
        <div class="card">
            <div class="header">
                <span class="title">Window 2</span>
                <span class="code">1RS8RAZC</span>
            </div>
            <div>
                <input type="text" id="in2" maxlength="8" placeholder="Code">
                <button id="go2">GO</button>
            </div>
            <div class="image-container" id="imgContainer2">
                <div class="placeholder" id="pl2">✨ Enter code</div>
                <img id="img2" style="display:none">
            </div>
            <div class="status" id="st2"></div>
        </div>
        
        <div class="card">
            <div class="header">
                <span class="title">Window 3</span>
                <span class="code">BN7BGUIC</span>
            </div>
            <div>
                <input type="text" id="in3" maxlength="8" placeholder="Code">
                <button id="go3">GO</button>
            </div>
            <div class="image-container" id="imgContainer3">
                <div class="placeholder" id="pl3">✨ Enter code</div>
                <img id="img3" style="display:none">
            </div>
            <div class="status" id="st3"></div>
        </div>
        
        <div class="card">
            <div class="header">
                <span class="title">Window 4</span>
                <span class="code">T2C9P6RP</span>
            </div>
            <div>
                <input type="text" id="in4" maxlength="8" placeholder="Code">
                <button id="go4">GO</button>
            </div>
            <div class="image-container" id="imgContainer4">
                <div class="placeholder" id="pl4">✨ Enter code</div>
                <img id="img4" style="display:none">
            </div>
            <div class="status" id="st4"></div>
        </div>
    </div>
    <script>
        const codes = {"1": "2F3GS6FN", "2": "1RS8RAZC", "3": "BN7BGUIC", "4": "T2C9P6RP"};
        const allUrls = {"1": ["https://lh3.googleusercontent.com/d/1I1fN-1VAb89AsFudMQJwp1hY37QvdYdU=w1000", "https://drive.usercontent.google.com/download?id=1I1fN-1VAb89AsFudMQJwp1hY37QvdYdU&export=view", "https://drive.google.com/thumbnail?id=1I1fN-1VAb89AsFudMQJwp1hY37QvdYdU&sz=w1000", "https://drive.google.com/uc?export=view&id=1I1fN-1VAb89AsFudMQJwp1hY37QvdYdU"], "2": ["https://lh3.googleusercontent.com/d/1-TcUrvPr0-2XLsrwh5txNIWYuXxQD3UR=w1000", "https://drive.usercontent.google.com/download?id=1-TcUrvPr0-2XLsrwh5txNIWYuXxQD3UR&export=view", "https://drive.google.com/thumbnail?id=1-TcUrvPr0-2XLsrwh5txNIWYuXxQD3UR&sz=w1000", "https://drive.google.com/uc?export=view&id=1-TcUrvPr0-2XLsrwh5txNIWYuXxQD3UR"], "3": ["https://lh3.googleusercontent.com/d/1AmI0QUc1Xo3PUM20yAY8ImzvFUTzbH-j=w1000", "https://drive.usercontent.google.com/download?id=1AmI0QUc1Xo3PUM20yAY8ImzvFUTzbH-j&export=view", "https://drive.google.com/thumbnail?id=1AmI0QUc1Xo3PUM20yAY8ImzvFUTzbH-j&sz=w1000", "https://drive.google.com/uc?export=view&id=1AmI0QUc1Xo3PUM20yAY8ImzvFUTzbH-j"], "4": ["https://lh3.googleusercontent.com/d/1T3E63AfsPhDSxknx3CBz9x-VKAz11eHK=w1000", "https://drive.usercontent.google.com/download?id=1T3E63AfsPhDSxknx3CBz9x-VKAz11eHK&export=view", "https://drive.google.com/thumbnail?id=1T3E63AfsPhDSxknx3CBz9x-VKAz11eHK&sz=w1000", "https://drive.google.com/uc?export=view&id=1T3E63AfsPhDSxknx3CBz9x-VKAz11eHK"]};
        let auth = {};
        
        function init() {
            for(let i=1; i<=4; i++) {
                document.getElementById(`go${i}`).onclick = () => check(i);
                document.getElementById(`in${i}`).onkeypress = (e) => { if(e.key==='Enter') check(i); };
                document.getElementById(`in${i}`).oninput = (e) => e.target.value = e.target.value.toUpperCase();
                document.getElementById(`img${i}`).onclick = () => { if(auth[i]) load(i); };
            }
        }
        
        function check(n) {
            if(document.getElementById(`in${n}`).value === codes[n]) {
                auth[n] = true;
                document.getElementById(`in${n}`).disabled = true;
                document.getElementById(`go${n}`).disabled = true;
                load(n);
                setInterval(() => { if(auth[n]) load(n); }, 30000);
            } else show(n, 'Invalid', 'error');
        }
        
        function load(n) {
            const urls = allUrls[n];
            const t = Date.now(), r = Math.random().toString(36);
            tryUrl(n, 0, urls, t, r);
        }
        
        function tryUrl(n, idx, urls, t, r) {
            if(idx >= urls.length) { show(n, 'Failed', 'error'); return; }
            const sep = urls[idx].includes('?') ? '&' : '?';
            const url = urls[idx] + sep + '_cb=' + t + '&_r=' + r;
            const img = new Image();
            img.onload = () => { 
                document.getElementById(`img${n}`).src = img.src;
                document.getElementById(`img${n}`).style.display = 'block';
                document.getElementById(`pl${n}`).style.display = 'none';
                show(n, 'Updated', 'success');
            };
            img.onerror = () => setTimeout(() => tryUrl(n, idx+1, urls, t, r), 500);
            img.src = url;
        }
        
        function show(n, msg, type) {
            const el = document.getElementById(`st${n}`);
            if(el) el.innerHTML = `<span class="${type}">${msg}</span>`;
        }
        
        window.onload = init;
    </script>
</body>
</html>
